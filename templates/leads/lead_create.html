{% extends "base.html" %}

{% block content %}

    <h3>Create Lead</h3>

    <div class="card p-4">

        <form method="post">

            {% csrf_token %}

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Name</label>
                    {{ form.name }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Phone</label>
                    {{ form.phone }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email</label>
                    {{ form.email }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Business Type</label>
                    {{ form.business_type }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Source</label>
                    {{ form.source }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Status</label>
                    {{ form.status }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Estimated Value</label>
                    {{ form.estimated_value }}
                </div>

                <div class="col-md-6 mb-3">
                    <label>Assign To</label>
                    {{ form.assigned_to }}
                </div>

                <div class="col-12 mb-3">
                    <label>Notes</label>
                    {{ form.notes }}
                </div>

            </div>

            <button class="btn btn-primary">
                Save Lead
            </button>

            <a href="{% url 'lead_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </form>

    </div>

{% endblock %}
