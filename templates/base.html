<!DOCTYPE html>
<html>
<head>
    <title>LeadCRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-2 bg-dark text-white min-vh-100">
            <h4 class="p-3">LeadCRM</h4>
            <a href="{% url 'dashboard' %}" class="text-white d-block mb-2">Dashboard</a>
            <a href="{% url 'lead_list' %}" class="text-white d-block mb-2">Leads</a>
            <a href="{% url 'pipeline' %}" class="text-white d-block mb-2">Pipeline</a>
            <a href="{% url 'followups_today' %}" class="text-white d-block mb-2">Followups Today</a>
            <a href="{% url 'followups_overdue' %}" class="text-white d-block mb-2">Followups Overdue</a>
            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button class="btn btn-light btn-sm">Logout</button>
            </form>
        </div>
        <div class="col-10 p-4">
            {% block content %}
            {% endblock %}
        </div>
    </div>
</div>
</body>
</html>
